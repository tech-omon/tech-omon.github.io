<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>OMON - On My Own Now!</title>

    <!-- Favicons -->
    <link href="../assets/favicon.ico" rel="icon">

    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Vendor CSS Files -->
    <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/vendor/font-awesome/css/font-awesome.min.css" rel="stylesheet">
    <!-- <link href="../assets/css/index.css" rel="stylesheet"> -->

    <style>
        body{
          background: linear-gradient(to bottom right, rgb(53 164 255), rgb(0, 132, 255)) fixed;
          font-family: 'Amatic SC';
        }
        input, button{
          font-family: "Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
        }
    </style>
  </head>

  <body>
      <div class="container" style="padding-top: 5%;">
        <div class="card text-center" style="margin: 0 auto; float: none; max-width: 600px;">
          <div class="card-header">
            <h1 style="font-size: 45px; font-weight: bold;">Hello There!</h1>
          </div>
          <div class="card-body px-lg-5">
            <form>
              <div class="form-group">
                <h1>Email address</h1>
                <input type="email" class="form-control" id="exampleInputEmail1">
              </div>
              <div class="form-group">
                <h1>Password</h1>
                <input type="password" class="form-control" id="exampleInputPassword1">
              </div>
              <div class="form-group">
                <h1>Confirm Password</h1>
                <input type="password" class="form-control" id="exampleInputPassword1">
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%">Create New Account</button>
            </form>
            <h1 class="my-2">OR</h1>
            <button type="submit" class="btn btn-danger" style="width: 100%">Sign Up with Google</button>
          </div>
          <div class="card-footer text-muted">
            <h3>Already have an account?  <a href="login.html">Log In</a></h3>
          </div>
        </div>
      </div>
  </body>

  <!-- Vendor JS Files -->
  <script src="../assets/vendor/jquery/jquery.min.js"></script>
  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js" charset="utf-8"></script>
</html>
